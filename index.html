<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartDay - Умный список дел с AI</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e8e8ed;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #007aff;
            --accent-hover: #0051d5;
            --border: #d2d2d7;
            --shadow: rgba(0,0,0,0.1);
            --urgent: #ff3b30;
            --normal: #007aff;
            --low: #34c759;
            --card-bg: #ffffff;
            --input-bg: #f5f5f7;
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --border: #38383a;
            --shadow: rgba(0,0,0,0.3);
            --urgent: #ff453a;
            --normal: #0a84ff;
            --low: #32d74b;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        @media (min-width: 768px) {
            .container { padding: 20px; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (min-width: 768px) {
            .logo { font-size: 28px; }
        }

        .theme-toggle {
            width: 52px;
            height: 32px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: none;
            cursor: pointer;
            position: relative;
        }

        .theme-toggle::after {
            content: '';
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        [data-theme="dark"] .theme-toggle::after {
            transform: translateX(20px);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow);
        }

        @media (min-width: 768px) {
            .panel { padding: 28px; }
        }

        .panel-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 16px 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 6px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .input-group {
            margin-bottom: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea {
            min-height: 70px;
            resize: vertical;
        }

        .priority-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .priority-btn {
            padding: 12px 8px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .priority-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 122, 255, 0.1);
        }

        .priority-btn.urgent.active {
            border-color: var(--urgent);
            color: var(--urgent);
            background: rgba(255, 59, 48, 0.1);
        }

        .priority-btn.low.active {
            border-color: var(--low);
            color: var(--low);
            background: rgba(52, 199, 89, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: 0.5;
        }

        .btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 400px;
            overflow-y: auto;
        }

        .task-card {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .task-card.completed {
            opacity: 0.6;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }

        .priority-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .priority-badge.urgent {
            background: rgba(255, 59, 48, 0.15);
            color: var(--urgent);
        }

        .priority-badge.normal {
            background: rgba(0, 122, 255, 0.15);
            color: var(--normal);
        }

        .priority-badge.low {
            background: rgba(52, 199, 89, 0.15);
            color: var(--low);
        }

        .task-description {
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-size: 14px;
        }

        .task-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .action-btn {
            padding: 10px;
            font-size: 12px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 400px;
        }

        .chat-info {
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
            margin-bottom: 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px;
            background: var(--bg-secondary);
            border-radius: 14px;
            margin-bottom: 14px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
        }

        .message.assistant {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
        }

        .chat-input-group {
            display: flex;
            gap: 10px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group .btn {
            width: auto;
            padding: 14px 18px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-box {
            position: relative;
            margin-bottom: 14px;
        }

        .search-box input {
            padding-left: 40px;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span>📅</span>
                <span>SmartDay</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()"></button>
        </div>

        <div class="grid">
            <div class="panel">
                <div class="panel-title">Мои задачи</div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Всего</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeCount">0</div>
                        <div class="stat-label">Активных</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="completedCount">0</div>
                        <div class="stat-label">Готово</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('active')">Активные</button>
                    <button class="tab" onclick="switchTab('completed')">Готовые</button>
                </div>

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search" placeholder="Поиск..." oninput="renderTasks()">
                </div>

                <div class="input-group">
                    <select id="sortBy" onchange="renderTasks()">
                        <option value="date">По дате</option>
                        <option value="priority">По приоритету</option>
                        <option value="title">По названию</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" id="title" placeholder="Название задачи">
                </div>

                <div class="input-group">
                    <textarea id="description" placeholder="Описание (необязательно)"></textarea>
                </div>

                <div class="input-group">
                    <div style="font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase;">Приоритет</div>
                    <div class="priority-grid">
                        <button class="priority-btn urgent" onclick="selectPriority('urgent')">
                            <span>🔥</span>
                            <span>Срочно</span>
                        </button>
                        <button class="priority-btn normal active" onclick="selectPriority('normal')">
                            <span>📌</span>
                            <span>Обычно</span>
                        </button>
                        <button class="priority-btn low" onclick="selectPriority('low')">
                            <span>✅</span>
                            <span>Позже</span>
                        </button>
                    </div>
                </div>

                <button class="btn" onclick="addTask()">Добавить задачу</button>

                <div class="tasks-list" id="tasksList" style="margin-top: 20px;">
                    <div class="empty-state">📝<br>Нет задач</div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">
                    <span>🤖</span>
                    <span>AI Помощник</span>
                </div>

                <div class="chat-info" id="chatInfo">Общий чат</div>

                <button class="btn secondary" id="backBtn" style="display:none; margin-bottom: 14px" onclick="closeChat()">← Вернуться</button>

                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message assistant">Привет! Я AI помощник SmartDay. Помогу разбить задачу на шаги, оценить время, расставить приоритеты!</div>
                    </div>

                    <div class="chat-input-group">
                        <input type="text" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button class="btn" onclick="sendMessage()" id="sendBtn">➤</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let tab = 'active';
        let priority = 'normal';
        let currentTask = null;
        let globalChat = [];
        let theme = 'light';

        function init() {
            const saved = localStorage.getItem('smartday_theme');
            if (saved) {
                theme = saved;
                document.documentElement.setAttribute('data-theme', theme);
            }
            const savedTasks = localStorage.getItem('smartday_tasks');
            if (savedTasks) tasks = JSON.parse(savedTasks);
            const savedChat = localStorage.getItem('smartday_globalchat');
            if (savedChat) globalChat = JSON.parse(savedChat);
            renderTasks();
            updateStats();
        }

        function toggleTheme() {
            theme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('smartday_theme', theme);
        }

        function selectPriority(p) {
            priority = p;
            document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.priority-btn').classList.add('active');
        }

        function switchTab(t) {
            tab = t;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function addTask() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            if (!title) { alert('Введите название'); return; }
            
            tasks.unshift({
                id: Date.now(),
                title,
                description,
                priority,
                completed: false,
                created: new Date().toLocaleString('ru'),
                chat: []
            });
            
            localStorage.setItem('smartday_tasks', JSON.stringify(tasks));
            renderTasks();
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            selectPriority('normal');
            updateStats();
        }

        function deleteTask(id) {
            if (!confirm('Удалить?')) return;
            tasks = tasks.filter(t => t.id !== id);
            if (currentTask === id) closeChat();
            localStorage.setItem('smartday_tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                localStorage.setItem('smartday_tasks', JSON.stringify(tasks));
                renderTasks();
                updateStats();
            }
        }

        function openChat(task) {
            currentTask = task.id;
            document.getElementById('chatInfo').textContent = `Чат: ${task.title}`;
            document.getElementById('backBtn').style.display = 'block';
            
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = '';
            
            if (task.chat.length === 0) {
                addMsg('assistant', `Обсудим "${task.title}"? Помогу разбить на шаги!`);
            } else {
                task.chat.forEach(m => addMsg(m.role, m.content));
            }
        }

        function closeChat() {
            currentTask = null;
            document.getElementById('chatInfo').textContent = 'Общий чат';
            document.getElementById('backBtn').style.display = 'none';
            
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = '';
            
            if (globalChat.length === 0) {
                addMsg('assistant', 'Привет! Я AI помощник SmartDay. Помогу разбить задачу на шаги, оценить время, расставить приоритеты!');
            } else {
                globalChat.forEach(m => addMsg(m.role, m.content));
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            const search = document.getElementById('search').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;
            
            let filtered = tasks.filter(t => {
                const matchTab = tab === 'active' ? !t.completed : t.completed;
                const matchSearch = !search || t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search);
                return matchTab && matchSearch;
            });

            if (sortBy === 'priority') {
                const order = {urgent: 0, normal: 1, low: 2};
                filtered.sort((a, b) => order[a.priority] - order[b.priority]);
            } else if (sortBy === 'title') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else {
                filtered.sort((a, b) => b.id - a.id);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">🔍<br>Ничего не найдено</div>';
                return;
            }

            list.innerHTML = filtered.map(t => {
                const pClass = t.priority;
                const pText = {urgent: '🔥 Срочно', normal: '📌 Обычно', low: '✅ Позже'}[t.priority];
                
                return `
                    <div class="task-card ${t.completed ? 'completed' : ''}">
                        <div class="task-header">
                            <div class="task-title">${esc(t.title)}</div>
                            <div class="priority-badge ${pClass}">${pText}</div>
                        </div>
                        ${t.description ? `<div class="task-description">${esc(t.description)}</div>` : ''}
                        <div class="task-actions">
                            <button class="btn action-btn" onclick='openChat(${JSON.stringify(t).replace(/'/g, "&#39;")})'>💬 AI</button>
                            <button class="btn ${t.completed ? 'secondary' : ''} action-btn" onclick="toggleComplete(${t.id})">${t.completed ? '↩️' : '✓'}</button>
                            <button class="btn secondary action-btn" style="background: var(--urgent); color: white;" onclick="deleteTask(${t.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMsg('user', msg);
            input.value = '';

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';

            try {
                let history, system = 'Ты AI помощник SmartDay. Помогаешь с задачами. Отвечай кратко на русском.';
                
                if (currentTask) {
                    const task = tasks.find(t => t.id === currentTask);
                    history = task.chat;
                    system += ` Задача: "${task.title}".`;
                    if (task.description) system += ` Описание: "${task.description}".`;
                } else {
                    history = globalChat;
                }

                history.push({role: 'user', content: msg});

                const res = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ system, messages: history })
                });

                const data = await res.json();
                const reply = data.content[0].text;
                
                history.push({role: 'assistant', content: reply});
                addMsg('assistant', reply);

                if (currentTask) {
                    tasks.find(t => t.id === currentTask).chat = history;
                    localStorage.setItem('smartday_tasks', JSON.stringify(tasks));
                } else {
                    localStorage.setItem('smartday_globalchat', JSON.stringify(globalChat));
                }

            } catch (e) {
                addMsg('assistant', 'Ошибка AI. Проверьте настройки.');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = '➤';
            }
        }

        function addMsg(role, content) {
            const chat = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = content;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('activeCount').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
        }

        function esc(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
