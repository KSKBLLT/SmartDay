<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Day - Умный список дел с AI</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e8e8ed;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent: #007aff;
            --accent-hover: #0051d5;
            --border: #d2d2d7;
            --shadow: rgba(0,0,0,0.1);
            --urgent: #ff3b30;
            --normal: #007aff;
            --low: #34c759;
            --card-bg: #ffffff;
            --input-bg: #f5f5f7;
        }

        [data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #1c1c1e;
            --bg-tertiary: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --border: #38383a;
            --shadow: rgba(0,0,0,0.3);
            --urgent: #ff453a;
            --normal: #0a84ff;
            --low: #32d74b;
            --card-bg: #1c1c1e;
            --input-bg: #2c2c2e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 40px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 40px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            width: 52px;
            height: 32px;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: none;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .theme-toggle::after {
            content: '';
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px var(--shadow);
        }

        [data-theme="dark"] .theme-toggle::after {
            transform: translateX(20px);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px var(--shadow);
            transition: all 0.3s ease;
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .tab.active {
            background: var(--card-bg);
            color: var(--text-primary);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .input-group {
            margin-bottom: 16px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s ease;
            resize: vertical;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
        }

        textarea {
            min-height: 80px;
            line-height: 1.6;
        }

        .priority-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .priority-btn {
            padding: 14px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .priority-btn:hover {
            transform: translateY(-2px);
        }

        .priority-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 122, 255, 0.1);
        }

        .priority-btn.urgent.active {
            border-color: var(--urgent);
            color: var(--urgent);
            background: rgba(255, 59, 48, 0.1);
        }

        .priority-btn.low.active {
            border-color: var(--low);
            color: var(--low);
            background: rgba(52, 199, 89, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .tasks-list::-webkit-scrollbar {
            width: 6px;
        }

        .tasks-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .tasks-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .task-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .task-card.completed {
            opacity: 0.6;
        }

        .task-card.completed .task-title,
        .task-card.completed .task-description {
            text-decoration: line-through;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .task-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            flex: 1;
        }

        .priority-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .priority-badge.urgent {
            background: rgba(255, 59, 48, 0.15);
            color: var(--urgent);
        }

        .priority-badge.normal {
            background: rgba(0, 122, 255, 0.15);
            color: var(--normal);
        }

        .priority-badge.low {
            background: rgba(52, 199, 89, 0.15);
            color: var(--low);
        }

        .task-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 16px;
            font-size: 13px;
            border-radius: 10px;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
        }

        .chat-info {
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input-group {
            display: flex;
            gap: 12px;
        }

        .chat-input-group input {
            flex: 1;
        }

        .chat-input-group .btn {
            width: auto;
            padding: 14px 24px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-box input {
            padding-left: 44px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }

            .header {
                padding: 12px 0 24px;
                margin-bottom: 24px;
            }

            .logo {
                font-size: 22px;
            }

            .panel {
                padding: 20px;
            }

            .panel-title {
                font-size: 20px;
            }

            .task-actions {
                flex-direction: column;
            }

            .action-btn {
                min-width: 0;
            }

            .priority-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span>📅</span>
                <span>Smart Day</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
        </div>

        <div class="grid">
            <!-- LEFT PANEL: TASKS -->
            <div class="panel">
                <div class="panel-title">
                    <span>Мои задачи</span>
                </div>

                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">Всего</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="activeCount">0</div>
                        <div class="stat-label">Активных</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="completedCount">0</div>
                        <div class="stat-label">Готово</div>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab active" onclick="switchTab('active')">Активные</button>
                    <button class="tab" onclick="switchTab('completed')">Готовые</button>
                </div>

                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search" placeholder="Поиск задач..." oninput="renderTasks()">
                </div>

                <div class="input-group">
                    <select id="sortBy" onchange="renderTasks()">
                        <option value="date">По дате</option>
                        <option value="priority">По приоритету</option>
                        <option value="title">По названию</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="text" id="title" placeholder="Название задачи">
                </div>

                <div class="input-group">
                    <textarea id="description" placeholder="Описание задачи (необязательно)"></textarea>
                </div>

                <div class="input-group">
                    <label style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: block; text-transform: uppercase; letter-spacing: 0.5px;">Приоритет</label>
                    <div class="priority-grid">
                        <button class="priority-btn urgent" onclick="selectPriority('urgent')">
                            <span>🔥</span>
                            <span>Срочно</span>
                        </button>
                        <button class="priority-btn normal active" onclick="selectPriority('normal')">
                            <span>📌</span>
                            <span>Обычно</span>
                        </button>
                        <button class="priority-btn low" onclick="selectPriority('low')">
                            <span>✅</span>
                            <span>Позже</span>
                        </button>
                    </div>
                </div>

                <button class="btn" onclick="addTask()">Добавить задачу</button>

                <div class="tasks-list" id="tasksList" style="margin-top: 24px;">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-text">Нет задач</div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: AI CHAT -->
            <div class="panel">
                <div class="panel-title">
                    <span>🤖</span>
                    <span>AI Помощник</span>
                </div>

                <div class="chat-info" id="chatInfo">Общий чат</div>

                <button class="btn secondary" id="backBtn" style="display:none; margin-bottom: 16px" onclick="closeChat()">
                    ← Вернуться
                </button>

                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message assistant">
                            Привет! Я AI помощник Smart Day. Могу помочь разбить задачу на шаги, оценить время выполнения, расставить приоритеты. Просто расскажи о своей задаче!
                        </div>
                    </div>

                    <div class="chat-input-group">
                        <input type="text" id="chatInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
                        <button class="btn" onclick="sendMessage()" id="sendBtn">
                            Отправить
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let tab = 'active';
        let priority = 'normal';
        let currentTask = null;
        let globalChat = [];
        let theme = 'light';

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                theme = saved;
                document.documentElement.setAttribute('data-theme', theme);
            }
        }

        function toggleTheme() {
            theme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        function selectPriority(p) {
            priority = p;
            document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
            event.target.closest('.priority-btn').classList.add('active');
        }

        function switchTab(t) {
            tab = t;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderTasks();
        }

        function addTask() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            
            if (!title) {
                alert('Введите название задачи');
                return;
            }
            
            const task = {
                id: Date.now(),
                title,
                description,
                priority,
                completed: false,
                created: new Date().toLocaleString('ru'),
                chat: []
            };
            
            tasks.unshift(task);
            saveTasks();
            renderTasks();
            
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            selectPriority('normal');
            updateStats();
        }

        function deleteTask(id) {
            if (!confirm('Удалить задачу?')) return;
            tasks = tasks.filter(t => t.id !== id);
            if (currentTask === id) closeChat();
            saveTasks();
            renderTasks();
            updateStats();
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function openChat(task) {
            currentTask = task.id;
            document.getElementById('chatInfo').textContent = `Чат: ${task.title}`;
            document.getElementById('backBtn').style.display = 'block';
            
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = '';
            
            if (task.chat.length === 0) {
                addMessageToDOM('assistant', `Обсудим задачу "${task.title}"? Могу помочь разбить её на шаги, оценить время или расставить приоритеты.`);
            } else {
                task.chat.forEach(m => {
                    addMessageToDOM(m.role, m.content);
                });
            }
        }

        function closeChat() {
            currentTask = null;
            document.getElementById('chatInfo').textContent = 'Общий чат';
            document.getElementById('backBtn').style.display = 'none';
            
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = '';
            
            if (globalChat.length === 0) {
                addMessageToDOM('assistant', 'Привет! Я AI помощник Smart Day. Могу помочь разбить задачу на шаги, оценить время выполнения, расставить приоритеты. Просто расскажи о своей задаче!');
            } else {
                globalChat.forEach(m => {
                    addMessageToDOM(m.role, m.content);
                });
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasksList');
            const search = document.getElementById('search').value.toLowerCase();
            const sortBy = document.getElementById('sortBy').value;
            
            let filtered = tasks.filter(t => {
                const matchTab = tab === 'active' ? !t.completed : t.completed;
                const matchSearch = !search || 
                    t.title.toLowerCase().includes(search) || 
                    t.description.toLowerCase().includes(search);
                return matchTab && matchSearch;
            });

            if (sortBy === 'priority') {
                const priorityOrder = {urgent: 0, normal: 1, low: 2};
                filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
            } else if (sortBy === 'title') {
                filtered.sort((a, b) => a.title.localeCompare(b.title));
            } else {
                filtered.sort((a, b) => b.id - a.id);
            }
            
            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-text">Ничего не найдено</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(t => {
                const priorityClass = t.priority;
                const priorityText = {
                    urgent: '🔥 Срочно',
                    normal: '📌 Обычно',
                    low: '✅ Позже'
                }[t.priority];
                
                return `
                    <div class="task-card ${t.completed ? 'completed' : ''}">
                        <div class="task-header">
                            <div class="task-title">${esc(t.title)}</div>
                            <div class="priority-badge ${priorityClass}">${priorityText}</div>
                        </div>
                        ${t.description ? `<div class="task-description">${esc(t.description)}</div>` : ''}
                        <div class="task-actions">
                            <button class="btn action-btn" onclick='openChat(${JSON.stringify(t).replace(/'/g, "&#39;")})'>💬 AI Чат</button>
                            <button class="btn ${t.completed ? 'secondary' : ''} action-btn" onclick="toggleComplete(${t.id})">${t.completed ? '↩️ Вернуть' : '✓ Готово'}</button>
                            <button class="btn secondary action-btn" style="background: var(--urgent);" onclick="deleteTask(${t.id})">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            addMessageToDOM('user', msg);
            input.value = '';

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span>';

            try {
                let history;
                let system = 'Ты AI помощник для управления задачами Smart Day. Помогаешь разбивать задачи на шаги, оценивать время, расставлять приоритеты. Отвечай кратко и по делу на русском языке.';
                
                if (currentTask) {
                    const task = tasks.find(t => t.id === currentTask);
                    history = task.chat;
                    system += ` Обсуждаем задачу: "${task.title}".`;
                    if (task.description) {
                        system += ` Описание: "${task.description}".`;
                    }
                } else {
                    history = globalChat;
                }

                history.push({role: 'user', content: msg});

                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': 'YOUR_API_KEY_HERE',
                        'anthropic-version': '2023-06-01'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system,
                        messages: history
                    })
                });

                const data = await res.json();
                const reply = data.content[0].text;
                
                history.push({role: 'assistant', content: reply});
                addMessageToDOM('assistant', reply);

                if (currentTask) {
                    const task = tasks.find(t => t.id === currentTask);
                    task.chat = history;
                    saveTasks();
                }

            } catch (e) {
                addMessageToDOM('assistant', 'Ошибка подключения к AI. Проверьте API ключ и интернет.');
                console.error(e);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Отправить';
            }
        }

        function addMessageToDOM(role, content) {
            const chat = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = content;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('activeCount').textContent = tasks.filter(t => !t.completed).length;
            document.getElementById('completedCount').textContent = tasks.filter(t => t.completed).length;
        }

        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('tasks');
            if (saved) {
                tasks = JSON.parse(saved);
                renderTasks();
                updateStats();
            }
        }

        function esc(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        initTheme();
        loadTasks();
        renderTasks();
        updateStats();
    </script>
</body>
</html>
